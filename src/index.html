<html>
    <head>
        <!-- MapLibre GL -->
        <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
        <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />

        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
            crossorigin="anonymous"></script>

        <!-- Proj4js -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.19.10/proj4.js"
            integrity="sha512-QXAXxYhXWvAc5fA3edU2rOQANjhwKAAlqz1WEhh/FXzODQoqVb9PkHqJcCG7aFoJpN0VQMNnxOBztoIQOcEO5w=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>

        <!-- JS & CSS -->
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>

        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    </head>
    <body>
        <div display="flex">
            <div id="map-container">
                <div id="crosshair"></div>
                <div id="map"></div>
            </div>
            <p id="coord-display"></p>
            <button id="add-button">+</button>
            <div id="point-list">
                <template>
                    <div class="list-item">
                        <p class="name"></p>
                        <p class="lng"></p>
                        <p class="lat"></p>
                    </div>
                </template>
            </div>
        </div>
        <dialog id="add-point">
            <div class="dialog-container">
                <div class="field">
                <label for="name">Name</label>
                <input type="text" name="name", id="dialog-name">
                </div>
                <div class="field">
                <label for="lng">Longitude</label>
                <input type="text" name="lng", id="dialog-lng">
                </div>
                <div class="field">
                <label for="lat">Latitude</label>
                <input type="text" name="lat", id="dialog-lat">
                </div>
                <div>
                <button id="add-point-confirm">Add</button>
                </div>
            </div>
        </dialog>
    </body>
<html>
