<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <title>Recce Web</title>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add,add_location_alt,arrow_back,arrows_input,checklist,close,compass_calibration,delete,edit,explore,location_on,map,pin_drop,ruler,save,share,show_chart,satellite_alt,settings,straighten,trip_origin,undo"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="app">
      <!-- Main Content Area -->
      <main id="main-content">
        <!-- Map Surface -->
        <section id="map-surface" class="surface">
          <div id="map-container">
            <div id="crosshair"></div>
            <div id="map"></div>
          </div>
          <div id="coord-container">
            <div id="target-coord-box" class="coord-box">
              <div>
                <h2>
                  <span class="material-symbols-outlined">arrows_input</span>
                  <span class="icon-title">Target</span>
                </h2>
                <p id="target-coord-display" class="coords"></p>
              </div>
              <div class="coord-actions">
                <button id="goto-btn" class="icon-btn" aria-label="Go to coordinates" title="Go To">
                  <span class="material-symbols-outlined">straighten</span>
                </button>
                <button id="add-button" class="icon-btn" aria-label="Add pin">
                  <span class="material-symbols-outlined">add_location_alt</span>
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- Saved Surface -->
        <section id="saved-surface" class="surface">
          <header class="surface-header">
            <h1>Saved</h1>
          </header>
          <!-- Saved Toolbar -->
          <div id="saved-toolbar" class="saved-toolbar">
            <button id="saved-sort-btn" class="btn-small" aria-label="Sort">Newest</button>
            <input
              type="text"
              id="saved-search"
              class="search-input"
              placeholder="Search..."
              aria-label="Search saved items"
            />
            <button id="saved-multiselect-btn" class="btn-small" aria-label="Multi-select">
              <span class="material-symbols-outlined">checklist</span>
            </button>
          </div>
          <!-- Multi-select Toolbar -->
          <div id="saved-multi-toolbar" class="saved-toolbar multi-toolbar" style="display: none">
            <button id="saved-cancel-btn" class="btn-small" aria-label="Cancel">
              <span class="material-symbols-outlined">close</span>
            </button>
            <span class="multi-count">Selected: <span id="selected-count">0</span></span>
            <button id="saved-ruler-btn" class="btn-small" aria-label="Add to Ruler">
              <span class="material-symbols-outlined">straighten</span>
            </button>
            <button id="saved-share-btn" class="btn-small" aria-label="Share">
              <span class="material-symbols-outlined">share</span>
            </button>
            <button id="saved-delete-btn" class="btn-small btn-danger" aria-label="Delete">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>
          <div id="saved-list" class="saved-content"></div>
        </section>
      </main>

      <!-- Bottom Navigation (mobile) -->
      <nav id="bottom-nav" class="bottom-nav">
        <button class="nav-tab active" data-tab="map" aria-label="Map">
          <span class="material-symbols-outlined">map</span>
          <span class="nav-label">Map</span>
        </button>
        <button class="nav-tab" data-tab="saved" aria-label="Saved">
          <span class="material-symbols-outlined">pin_drop</span>
          <span class="nav-label">Saved</span>
        </button>
      </nav>

      <!-- Toolbox FAB -->
      <button id="toolbox-fab" class="fab" aria-label="Open toolbox">
        <span class="material-symbols-outlined">explore</span>
      </button>

      <!-- Toolbox Modal -->
      <div id="toolbox-backdrop" class="modal-backdrop"></div>
      <aside id="toolbox-modal" class="toolbox-modal" role="dialog" aria-label="Toolbox">
        <header class="toolbox-header">
          <h2>Toolbox</h2>
          <button id="toolbox-close" class="icon-btn" aria-label="Close">
            <span class="material-symbols-outlined">arrow_back</span>
          </button>
        </header>
        <div class="toolbox-content">
          <section class="toolbox-panel" id="gps-panel">
            <h3>
              <span class="material-symbols-outlined">satellite_alt</span>
              GPS
            </h3>
            <p class="panel-placeholder">GPS panel coming soon</p>
          </section>
          <section class="toolbox-panel" id="ruler-panel">
            <h3>
              <span class="material-symbols-outlined">straighten</span>
              Ruler
            </h3>
            <p class="panel-placeholder">Ruler panel coming soon</p>
          </section>
          <section class="toolbox-panel" id="settings-panel">
            <h3>
              <span class="material-symbols-outlined">settings</span>
              Settings
            </h3>
            <p class="panel-placeholder">Settings panel coming soon</p>
          </section>
        </div>
      </aside>
    </div>

    <!-- Pin Editor Bottom Sheet -->
    <div id="pin-editor-backdrop" class="sheet-backdrop"></div>
    <div id="pin-editor" class="bottom-sheet" role="dialog" aria-label="Pin Editor">
      <div class="sheet-header">
        <h2 id="pin-editor-title">Add Pin</h2>
        <button id="pin-editor-close" class="icon-btn" aria-label="Close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="sheet-content">
        <div class="field">
          <label for="pin-editor-name">Name</label>
          <input type="text" id="pin-editor-name" maxlength="20" placeholder="Enter name" />
        </div>
        <div class="field">
          <label for="pin-editor-coord"
            >Coordinates (<span id="pin-editor-coord-label">WGS84</span>)</label
          >
          <input type="text" id="pin-editor-coord" placeholder="Enter coordinates" />
        </div>
        <div class="field">
          <label>Colour</label>
          <div id="pin-editor-colors" class="color-picker"></div>
        </div>
        <div class="field">
          <label for="pin-editor-group">Group</label>
          <input
            type="text"
            id="pin-editor-group"
            list="pin-editor-groups"
            placeholder="Optional group name"
          />
          <datalist id="pin-editor-groups"></datalist>
        </div>
        <div class="field">
          <label for="pin-editor-description">Description</label>
          <textarea
            id="pin-editor-description"
            rows="3"
            placeholder="Optional description"
          ></textarea>
        </div>
      </div>
      <div class="sheet-actions">
        <button id="pin-editor-delete" class="btn-danger" style="display: none">Delete</button>
        <button id="pin-editor-save" class="btn-primary">Save</button>
      </div>
    </div>

    <!-- Pin Info Modal -->
    <div id="pin-info-backdrop" class="modal-backdrop"></div>
    <div id="pin-info" class="info-modal" role="dialog" aria-label="Pin Information">
      <div class="info-modal-header">
        <h2 id="pin-info-name"></h2>
        <button id="pin-info-close" class="icon-btn" aria-label="Close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="info-modal-content">
        <span id="pin-info-group" class="tag"></span>
        <p id="pin-info-description" class="info-description"></p>
        <div id="pin-info-coord-list" class="coord-list"></div>
      </div>
      <div class="info-modal-actions">
        <button id="pin-info-open-maps" class="btn-secondary">
          <span class="material-symbols-outlined">map</span>
          Open in Maps
        </button>
        <button id="pin-info-map" class="btn-secondary">
          <span class="material-symbols-outlined">location_on</span>
          Go To
        </button>
        <button id="pin-info-edit" class="btn-primary">
          <span class="material-symbols-outlined">edit</span>
          Edit
        </button>
      </div>
    </div>

    <!-- Go To Dialog -->
    <div id="goto-backdrop" class="modal-backdrop"></div>
    <div id="goto-dialog" class="dialog" role="dialog" aria-label="Go To Coordinates">
      <div class="dialog-header">
        <h2>Go To</h2>
        <button id="goto-close" class="icon-btn" aria-label="Close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="dialog-content">
        <div class="field">
          <label for="goto-input">Coordinates</label>
          <input type="text" id="goto-input" placeholder="Enter coordinates" />
        </div>
      </div>
      <div class="dialog-actions">
        <button id="goto-submit" class="btn-primary">Go</button>
      </div>
    </div>

    <!-- Track Editor Bottom Sheet -->
    <div id="track-editor-backdrop" class="sheet-backdrop"></div>
    <div id="track-editor" class="bottom-sheet" role="dialog" aria-label="Track Editor">
      <div class="sheet-header">
        <h2 id="track-editor-title">New Track</h2>
        <button id="track-editor-close" class="icon-btn" aria-label="Close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="sheet-content">
        <div class="field">
          <label for="track-editor-name">Name</label>
          <input type="text" id="track-editor-name" maxlength="20" placeholder="Enter name" />
        </div>
        <div class="field">
          <label class="checkbox-label">
            <input type="checkbox" id="track-editor-type" />
            <span>Closed Area (polygon)</span>
          </label>
          <p id="track-editor-node-count" class="field-hint">0 nodes</p>
        </div>
        <div class="field">
          <label>Colour</label>
          <div id="track-editor-colors" class="color-picker"></div>
        </div>
        <div class="field">
          <label for="track-editor-group">Group</label>
          <input
            type="text"
            id="track-editor-group"
            list="track-editor-groups"
            placeholder="Optional group name"
          />
          <datalist id="track-editor-groups"></datalist>
        </div>
        <div class="field">
          <label for="track-editor-description">Description</label>
          <textarea
            id="track-editor-description"
            rows="3"
            placeholder="Optional description"
          ></textarea>
        </div>
      </div>
      <div class="sheet-actions">
        <button id="track-editor-delete" class="btn-danger" style="display: none">Delete</button>
        <button id="track-editor-save" class="btn-primary">Save</button>
      </div>
    </div>

    <!-- Track Info Modal -->
    <div id="track-info-backdrop" class="modal-backdrop"></div>
    <div id="track-info" class="info-modal" role="dialog" aria-label="Track Information">
      <div id="track-info-header" class="info-modal-header">
        <h2 id="track-info-name"></h2>
        <button id="track-info-close" class="icon-btn" aria-label="Close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="info-modal-content">
        <div class="track-type-badge">
          <span id="track-info-type-icon" class="material-symbols-outlined"></span>
          <span id="track-info-type-label"></span>
        </div>
        <div id="track-info-stats" class="track-stats"></div>
        <div id="track-info-checkpoints" class="track-checkpoints"></div>
        <span id="track-info-group" class="tag"></span>
        <p id="track-info-description" class="info-description"></p>
      </div>
      <div class="info-modal-actions">
        <button id="track-info-map" class="btn-secondary">
          <span class="material-symbols-outlined">location_on</span>
          View
        </button>
        <button id="track-info-edit" class="btn-primary">
          <span class="material-symbols-outlined">edit</span>
          Edit
        </button>
      </div>
    </div>

    <!-- Track Plot Bar -->
    <div id="track-plot-bar" class="plot-bar" style="display: none">
      <button id="plot-cancel-btn" class="btn-small btn-danger" aria-label="Cancel plotting">
        <span class="material-symbols-outlined">close</span>
      </button>
      <span id="plot-node-count" class="plot-count">0 nodes</span>
      <button id="plot-undo-btn" class="btn-small" aria-label="Remove last node">
        <span class="material-symbols-outlined">undo</span>
      </button>
      <button id="plot-node-btn" class="btn-small btn-primary" aria-label="Add node">
        <span class="material-symbols-outlined">add</span>
      </button>
      <button id="plot-save-btn" class="btn-small btn-primary" aria-label="Save track">
        <span class="material-symbols-outlined">save</span>
      </button>
    </div>

    <!-- Start Track FAB -->
    <button
      id="start-track-btn"
      class="fab fab-secondary"
      aria-label="Start track plotting"
      style="display: none"
    >
      <span class="material-symbols-outlined">show_chart</span>
    </button>

    <!-- Checkpoint Name Dialog -->
    <div id="checkpoint-backdrop" class="modal-backdrop"></div>
    <div id="checkpoint-dialog" class="dialog" role="dialog" aria-label="Checkpoint Name">
      <div class="dialog-header">
        <h2>Checkpoint Name</h2>
        <button id="checkpoint-close" class="icon-btn" aria-label="Close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="dialog-content">
        <div class="field">
          <label for="checkpoint-name">Name (optional)</label>
          <input
            type="text"
            id="checkpoint-name"
            maxlength="20"
            placeholder="Enter checkpoint name"
          />
        </div>
      </div>
      <div class="dialog-actions">
        <button id="checkpoint-skip" class="btn-secondary">Skip</button>
        <button id="checkpoint-confirm" class="btn-primary">Add</button>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
