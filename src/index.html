<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <title>Recce Web</title>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add,add_location_alt,arrow_back,arrows_input,compass_calibration,delete,explore,map,pin_drop,ruler,satellite_alt,settings,straighten"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="app">
      <!-- Main Content Area -->
      <main id="main-content">
        <!-- Map Surface -->
        <section id="map-surface" class="surface">
          <div id="map-container">
            <div id="crosshair"></div>
            <div id="map"></div>
          </div>
          <div id="coord-container">
            <div id="target-coord-box" class="coord-box">
              <div>
                <h2>
                  <span class="material-symbols-outlined">arrows_input</span>
                  <span class="icon-title">Target</span>
                </h2>
                <p id="target-coord-display" class="coords"></p>
              </div>
              <button id="add-button" class="icon-btn" aria-label="Add pin">
                <span class="material-symbols-outlined">add_location_alt</span>
              </button>
            </div>
          </div>
        </section>

        <!-- Saved Surface -->
        <section id="saved-surface" class="surface">
          <header class="surface-header">
            <h1>Saved</h1>
          </header>
          <div id="saved-list" class="saved-content"></div>
        </section>
      </main>

      <!-- Bottom Navigation (mobile) -->
      <nav id="bottom-nav" class="bottom-nav">
        <button class="nav-tab active" data-tab="map" aria-label="Map">
          <span class="material-symbols-outlined">map</span>
          <span class="nav-label">Map</span>
        </button>
        <button class="nav-tab" data-tab="saved" aria-label="Saved">
          <span class="material-symbols-outlined">pin_drop</span>
          <span class="nav-label">Saved</span>
        </button>
      </nav>

      <!-- Toolbox FAB -->
      <button id="toolbox-fab" class="fab" aria-label="Open toolbox">
        <span class="material-symbols-outlined">explore</span>
      </button>

      <!-- Toolbox Modal -->
      <div id="toolbox-backdrop" class="modal-backdrop"></div>
      <aside id="toolbox-modal" class="toolbox-modal" role="dialog" aria-label="Toolbox">
        <header class="toolbox-header">
          <h2>Toolbox</h2>
          <button id="toolbox-close" class="icon-btn" aria-label="Close">
            <span class="material-symbols-outlined">arrow_back</span>
          </button>
        </header>
        <div class="toolbox-content">
          <section class="toolbox-panel" id="gps-panel">
            <h3>
              <span class="material-symbols-outlined">satellite_alt</span>
              GPS
            </h3>
            <p class="panel-placeholder">GPS panel coming soon</p>
          </section>
          <section class="toolbox-panel" id="ruler-panel">
            <h3>
              <span class="material-symbols-outlined">straighten</span>
              Ruler
            </h3>
            <p class="panel-placeholder">Ruler panel coming soon</p>
          </section>
          <section class="toolbox-panel" id="settings-panel">
            <h3>
              <span class="material-symbols-outlined">settings</span>
              Settings
            </h3>
            <p class="panel-placeholder">Settings panel coming soon</p>
          </section>
        </div>
      </aside>
    </div>

    <!-- Add Pin Dialog -->
    <dialog id="add-point">
      <div class="dialog-container">
        <h2>ADD PIN</h2>
        <div class="field">
          <label for="dialog-name">Name</label>
          <input type="text" name="name" id="dialog-name" />
        </div>
        <div class="field">
          <label for="dialog-coord">Coordinates</label>
          <input type="text" name="coord" id="dialog-coord" />
        </div>
        <div>
          <button id="add-point-confirm">Add</button>
        </div>
      </div>
    </dialog>

    <script type="module" src="/main.js"></script>
  </body>
</html>
