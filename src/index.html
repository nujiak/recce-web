<html>
    <head>
        <!-- MapLibre GL -->
        <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
        <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />

        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
            crossorigin="anonymous"></script>

        <!-- Proj4js -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.19.10/proj4.js"
            integrity="sha512-QXAXxYhXWvAc5fA3edU2rOQANjhwKAAlqz1WEhh/FXzODQoqVb9PkHqJcCG7aFoJpN0VQMNnxOBztoIQOcEO5w=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>

        <!-- Dexie -->
        <script src="https://unpkg.com/dexie/dist/dexie.js"></script>

        <!-- JS & CSS -->
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>

        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    </head>
    <body>
        <div id="body-container">
            <div id="map-container">
                <div id="crosshair"></div>
                <div id="map"></div>
            </div>
            <div id="coord-container">
                <p id="user-coord-display" class="coord-box" style="display: none"></p>
                <div id="target-coord-box" class="coord-box" display="flex">
                    <p id="coord-display"></p>
                    <button id="add-button">ADD PIN</button>
                </div>
                <div id="pins-section">
                    <h2>Pins</h2>
                    <div id="point-list">
                        <template>
                            <div class="list-item">
                                <div class="list-item-content">
                                    <p class="name"></p>
                                    <p>
                                        <span class="lng"></span>
                                        <span class="lat"></span>
                                    </p>
                                </div>
                                <button>X</button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
        <dialog id="add-point">
            <div class="dialog-container">
                <h2>ADD PIN</h2>
                <div class="field">
                    <label for="name">Name</label>
                    <input type="text" name="name", id="dialog-name">
                </div>
                <div class="field">
                    <label for="lng">Longitude</label>
                    <input type="text" name="lng", id="dialog-lng">
                </div>
                <div class="field">
                    <label for="lat">Latitude</label>
                    <input type="text" name="lat", id="dialog-lat">
                </div>
                <div>
                    <button id="add-point-confirm">Add</button>
                </div>
            </div>
        </dialog>
    </body>
<html>
