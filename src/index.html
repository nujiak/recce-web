<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <title>Recce Web</title>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Install Prompt Banner (PWA) -->
    <div id="install-banner" class="install-banner">
      <div class="install-banner-content">
        <span class="material-symbols-outlined">download</span>
        <span>Add Recce to your home screen</span>
      </div>
      <div class="install-banner-actions">
        <button id="install-dismiss" class="btn-small">Not now</button>
        <button id="install-accept" class="btn-small btn-primary">Install</button>
      </div>
    </div>

    <script type="module" src="/main.tsx"></script>
  </body>
</html>
